name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Compile check
        working-directory: backend
        run: python -m py_compile main.py

      - name: Validate compose file
        run: docker compose config -q

      - name: Validate JSON/YAML configs
        run: |
          python -m pip install pyyaml
          python - <<'EOF'
          import json, yaml, glob
          for f in glob.glob("monitoring/**/*.json", recursive=True) + ["agent-config.json"]:
              json.load(open(f))
          for f in glob.glob("monitoring/**/*.yml", recursive=True):
              yaml.safe_load(open(f))
          print("all configs valid")
          EOF

  smoke-test:
    runs-on: ubuntu-latest
    needs: backend-checks
    steps:
      - uses: actions/checkout@v4

      - name: Bring up local stack
        run: |
          cp .env.example .env
          sed -i 's/PG_PASSWORD=.*/PG_PASSWORD=citestpassword/' .env
          sed -i 's/GRAFANA_ADMIN_PASSWORD=.*/GRAFANA_ADMIN_PASSWORD=citestpassword/' .env
          sed -i 's/VAPI_WEBHOOK_SECRET=.*/VAPI_WEBHOOK_SECRET=/' .env
          docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build backend postgres

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/healthz && exit 0
            sleep 2
          done
          echo "backend never became healthy"; docker compose logs backend; exit 1

      - name: Run simulated call through the pipeline
        run: |
          chmod +x backend/simulate-call.sh
          ./backend/simulate-call.sh
          curl -sf http://localhost:8000/calls | grep -q "test-call"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs
